// Envelope + framework messages for Spotify's gabo-receiver-service v3.
//
// Endpoint: POST https://spclient.wg.spotify.com/gabo-receiver-service/v3/events/
// Content-Type: application/x-protobuf
//
// Body is a PublishEventsRequest. Each EventEnvelope holds an event_name and a
// list of EventFragments. The actual event payload (e.g. a serialized
// RawCoreStream) lives in a fragment named "message". Context info — client id,
// installation id, app/device descriptors, time, sdk — lives in fragments
// named "context_*".
//
// Schemas extracted by the user from the official Spotify desktop binary
// (1.2.88.483 Windows / 1.1.73.517 macOS — both versions agree on field
// numbers). See memory entry: reference_event_sender_proto_schemas.md.

syntax = "proto3";

package spotify.event_sender;

option csharp_namespace = "Wavee.Protocol.EventSender";
option optimize_for = CODE_SIZE;

message PublishEventsRequest {
  repeated EventEnvelope event = 1;
  bool suppress_persist = 2;
}

message PublishEventsResponse {
  repeated EventError error = 1;

  message EventError {
    int32 index = 1;
    bool transient = 2;
    int32 reason = 3;
  }
}

message EventEnvelope {
  reserved 1;
  string event_name = 2;
  repeated EventFragment event_fragment = 3;
  bytes sequence_id = 4;
  int64 sequence_number = 5;

  message EventFragment {
    string name = 1;
    bytes data = 2;
  }
}

// ── Context fragment payloads ──
//
// Each of these is serialized and packed into an EventFragment whose `name`
// field matches the message: "context_client_id" carries a serialized ClientId,
// "context_application_desktop" carries a serialized ApplicationDesktop, etc.

message Application {
  string version = 1;
}

message ApplicationDesktop {
  string version_string = 1;
  int64 version_code = 2;
  bytes session_id = 3;
}

message ClientId {
  bytes value = 1;
}

message ClientContextId {
  string value = 1;
}

message Device {
  string manufacturer = 1;
  string model = 2;
}

message DeviceDesktop {
  string platform_type = 1;
  string device_manufacturer = 2;
  string device_model = 3;
  string device_id = 4;
  string os_version = 5;
}

message InstallationId {
  bytes value = 1;
}

message MonotonicClock {
  int64 id = 1;
  int64 value = 2;
}

message Os {
  string name = 1;
  string version = 2;
}

message Sdk {
  string version_name = 1;
  string type = 2;
}

message Time {
  int64 value = 1;
}
