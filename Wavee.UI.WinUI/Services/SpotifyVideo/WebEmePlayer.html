<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: data: blob: 'unsafe-inline'; media-src blob: https:; connect-src https:;">
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    video { width: 100%; height: 100%; background: #000; object-fit: contain; }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline></video>
  <script>
    const config = __WAVEE_PLAYER_CONFIG__;
    const startSeconds = clampPlaybackSeconds(__WAVEE_START_SECONDS__);
    const autoPlay = __WAVEE_AUTO_PLAY__;
    const video = document.getElementById('video');
    if (!autoPlay) video.autoplay = false;
    video.defaultMuted = false;
    video.muted = false;
    video.volume = 1;
    const pendingLicenses = new Map();
    let mediaSource;
    let sourceOpen = false;
    let fatal = false;
    let desiredPlaying = autoPlay;
    let unmuteScheduled = false;
    let stallRecoveryInFlight = false;
    let lastSoftRecoveryAt = 0;
    let lastHardRecoveryAt = 0;
    let lastBufferedLogAt = 0;
    let lastAudioStateLogAt = 0;
    let hostVolumeSet = false;
    let videoBufferRef = null;
    let audioBufferRef = null;
    let appendGeneration = 0;
    let pendingSeekSeconds = null;
    const fetchTimeoutMs = 12000;
    const fetchRetryCount = 3;

    function host(type, payload = {}) {
      chrome.webview.postMessage({ type, ...payload });
    }

    function log(message) {
      host('log', { message: String(message) });
    }

    function fail(error) {
      if (fatal) return;
      fatal = true;
      const message = error && error.stack ? error.stack : String(error);
      host('error', { message });
    }

    function clampPlaybackSeconds(value) {
      const seconds = Number(value);
      if (!Number.isFinite(seconds) || seconds <= 0) return 0;
      const duration = Number(config && config.durationMs) > 0 ? config.durationMs / 1000 : 0;
      if (duration <= 0) return seconds;
      return Math.max(0, Math.min(seconds, Math.max(0, duration - 0.5)));
    }

    function bytesToBase64(bytes) {
      let binary = '';
      const chunk = 0x8000;
      for (let i = 0; i < bytes.length; i += chunk) {
        binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
      }
      return btoa(binary);
    }

    function base64ToBytes(text) {
      const binary = atob(text);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    chrome.webview.addEventListener('message', async event => {
      const msg = event.data || {};
      if (msg.type === 'license-response') {
        const pending = pendingLicenses.get(msg.requestId);
        if (!pending) return;
        pendingLicenses.delete(msg.requestId);
        pending.resolve(base64ToBytes(msg.body));
      } else if (msg.type === 'license-error') {
        const pending = pendingLicenses.get(msg.requestId);
        if (!pending) return;
        pendingLicenses.delete(msg.requestId);
        pending.reject(new Error(msg.message || 'License request failed'));
      }
    });

    async function requestLicense(message) {
      const requestId = `${Date.now()}-${Math.random().toString(16).slice(2)}`;
      const body = bytesToBase64(new Uint8Array(message));
      const promise = new Promise((resolve, reject) => pendingLicenses.set(requestId, { resolve, reject }));
      host('license-request', { requestId, body });
      return promise;
    }

    async function configureEme() {
      if (!navigator.requestMediaKeySystemAccess) {
        throw new Error('EME is not available in this WebView2 runtime');
      }

      const keySystem = 'com.widevine.alpha';
      const mediaConfig = [{
        initDataTypes: ['webm', 'cenc'],
        audioCapabilities: [{ contentType: config.audio.contentType }],
        videoCapabilities: [{ contentType: config.video.contentType }],
        distinctiveIdentifier: 'optional',
        persistentState: 'optional',
        sessionTypes: ['temporary']
      }];

      log(`requestMediaKeySystemAccess ${keySystem}`);
      const access = await navigator.requestMediaKeySystemAccess(keySystem, mediaConfig);
      const mediaKeys = await access.createMediaKeys();
      await video.setMediaKeys(mediaKeys);

      video.addEventListener('encrypted', async e => {
        try {
          log(`encrypted initDataType=${e.initDataType} bytes=${e.initData ? e.initData.byteLength : 0}`);
          const session = mediaKeys.createSession();
          session.addEventListener('message', async ev => {
            try {
              log(`license message bytes=${ev.message.byteLength}`);
              const license = await requestLicense(ev.message);
              log(`license response bytes=${license.byteLength}`);
              await session.update(license);
              log('license update complete');
              if (desiredPlaying) recoverPlayback('license-update').catch(fail);
            } catch (err) {
              fail(err);
            }
          });
          await session.generateRequest(e.initDataType, e.initData);
        } catch (err) {
          fail(err);
        }
      });
    }

    async function fetchBytes(url) {
      let lastError;
      for (let attempt = 1; attempt <= fetchRetryCount; attempt++) {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), fetchTimeoutMs);
        try {
          const response = await fetch(url, {
            mode: 'cors',
            credentials: 'omit',
            cache: 'no-store',
            signal: controller.signal
          });
          if (!response.ok) throw new Error(`fetch ${response.status} ${url}`);
          return new Uint8Array(await response.arrayBuffer());
        } catch (err) {
          lastError = err;
          const name = err && err.name ? err.name : 'error';
          log(`fetch retry ${attempt}/${fetchRetryCount} failed (${name}) ${sanitizeUrl(url)}`);
          if (attempt < fetchRetryCount) await sleep(250 * attempt);
        } finally {
          clearTimeout(timeout);
        }
      }

      throw lastError || new Error(`fetch failed ${url}`);
    }

    function appendBuffer(sourceBuffer, bytes) {
      return new Promise((resolve, reject) => {
        const onError = () => {
          cleanup();
          reject(new Error('SourceBuffer append error'));
        };
        const onUpdateEnd = () => {
          cleanup();
          resolve();
        };
        const cleanup = () => {
          sourceBuffer.removeEventListener('error', onError);
          sourceBuffer.removeEventListener('updateend', onUpdateEnd);
        };
        sourceBuffer.addEventListener('error', onError, { once: true });
        sourceBuffer.addEventListener('updateend', onUpdateEnd, { once: true });
        sourceBuffer.appendBuffer(bytes);
      });
    }

    function removeBuffer(sourceBuffer, start, end) {
      return new Promise((resolve, reject) => {
        if (end <= start || sourceBuffer.updating) {
          resolve();
          return;
        }
        const onError = () => {
          cleanup();
          reject(new Error('SourceBuffer remove error'));
        };
        const onUpdateEnd = () => {
          cleanup();
          resolve();
        };
        const cleanup = () => {
          sourceBuffer.removeEventListener('error', onError);
          sourceBuffer.removeEventListener('updateend', onUpdateEnd);
        };
        sourceBuffer.addEventListener('error', onError, { once: true });
        sourceBuffer.addEventListener('updateend', onUpdateEnd, { once: true });
        sourceBuffer.remove(start, end);
      });
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function waitForUpdateEnd(sourceBuffer) {
      return new Promise((resolve, reject) => {
        if (!sourceBuffer || !sourceBuffer.updating) {
          resolve();
          return;
        }

        const onError = () => {
          cleanup();
          reject(new Error('SourceBuffer update error'));
        };
        const onUpdateEnd = () => {
          cleanup();
          resolve();
        };
        const cleanup = () => {
          sourceBuffer.removeEventListener('error', onError);
          sourceBuffer.removeEventListener('updateend', onUpdateEnd);
        };
        sourceBuffer.addEventListener('error', onError, { once: true });
        sourceBuffer.addEventListener('updateend', onUpdateEnd, { once: true });
      });
    }

    async function waitForIdle(sourceBuffer) {
      while (sourceBuffer && sourceBuffer.updating) {
        await waitForUpdateEnd(sourceBuffer);
      }
    }

    async function clearBufferedRanges(sourceBuffer, label) {
      if (!sourceBuffer) return;
      await waitForIdle(sourceBuffer);

      try {
        sourceBuffer.abort();
      } catch (_) {
        // abort() is only valid for some SourceBuffer states.
      }

      await waitForIdle(sourceBuffer);
      for (let i = sourceBuffer.buffered.length - 1; i >= 0; i--) {
        const start = sourceBuffer.buffered.start(i);
        const end = sourceBuffer.buffered.end(i);
        if (end <= start) continue;
        log(`${label} clear ${start.toFixed(1)}-${end.toFixed(1)}`);
        await removeBuffer(sourceBuffer, start, end);
        await waitForIdle(sourceBuffer);
      }
    }

    function segmentIndexForSeconds(seconds) {
      const segmentLength = Number(config.segmentLength) > 0 ? Number(config.segmentLength) : 4;
      return Math.max(0, Math.min(config.segmentTimes.length - 1, Math.floor(seconds / segmentLength)));
    }

    function isTimeBuffered(seconds, margin = 0.2) {
      const ranges = video.buffered;
      if (!ranges || ranges.length === 0) return false;

      for (let i = 0; i < ranges.length; i++) {
        if (seconds >= ranges.start(i) - margin && seconds <= ranges.end(i) - 0.05) {
          return true;
        }
      }

      return false;
    }

    function bufferedEnd(sourceBuffer) {
      const ranges = sourceBuffer.buffered;
      if (!ranges || ranges.length === 0) return 0;
      const t = video.currentTime || startSeconds || 0;
      for (let i = 0; i < ranges.length; i++) {
        if (ranges.start(i) <= t && ranges.end(i) >= t) return ranges.end(i);
      }
      return ranges.end(ranges.length - 1);
    }

    function videoBufferedAhead() {
      const ranges = video.buffered;
      if (!ranges || ranges.length === 0) return 0;

      const t = video.currentTime || 0;
      for (let i = 0; i < ranges.length; i++) {
        if (ranges.start(i) <= t && ranges.end(i) >= t) {
          return Math.max(0, ranges.end(i) - t);
        }
      }

      return 0;
    }

    function sourceBufferedAhead(sourceBuffer) {
      if (!sourceBuffer) return 0;
      const ranges = sourceBuffer.buffered;
      if (!ranges || ranges.length === 0) return 0;

      const t = video.currentTime || 0;
      for (let i = 0; i < ranges.length; i++) {
        if (ranges.start(i) <= t && ranges.end(i) >= t) {
          return Math.max(0, ranges.end(i) - t);
        }
      }

      return 0;
    }

    function forceAudible(reason) {
      const wasMuted = video.muted || video.defaultMuted;
      if (video.defaultMuted) video.defaultMuted = false;
      if (video.muted) video.muted = false;
      if (!hostVolumeSet && (!Number.isFinite(video.volume) || video.volume <= 0)) {
        video.volume = 1;
      }

      if (wasMuted || video.volume <= 0) {
        log(`audio force ${reason}: muted=${video.muted} volume=${Number(video.volume).toFixed(2)} hostVolumeSet=${hostVolumeSet}`);
      }
    }

    function reportAudioState(reason, force = false) {
      const now = performance.now();
      if (!force && now - lastAudioStateLogAt < 2500) return;
      lastAudioStateLogAt = now;

      const audioAhead = sourceBufferedAhead(audioBufferRef);
      const videoAhead = sourceBufferedAhead(videoBufferRef);
      const audioTrackCount = video.audioTracks ? video.audioTracks.length : -1;
      const audible = !video.muted && video.volume > 0;
      if (force || !audible || audioAhead < 0.25) {
        log(`audio ${reason}: audible=${audible} muted=${video.muted} volume=${Number(video.volume).toFixed(2)} audioAhead=${audioAhead.toFixed(2)}s videoAhead=${videoAhead.toFixed(2)}s audioTracks=${audioTrackCount} readyState=${video.readyState}`);
      }
    }

    function sanitizeUrl(url) {
      const text = String(url);
      const queryIndex = text.indexOf('?');
      return queryIndex >= 0 ? text.slice(0, queryIndex) : text;
    }

    async function pruneBehind(sourceBuffer, label) {
      const ranges = sourceBuffer.buffered;
      if (!ranges || ranges.length === 0) return;
      const removeEnd = Math.max(0, (video.currentTime || 0) - 25);
      if (removeEnd <= 0) return;

      for (let i = 0; i < ranges.length; i++) {
        const start = ranges.start(i);
        const end = Math.min(ranges.end(i), removeEnd);
        if (end > start + 1) {
          log(`${label} prune ${start.toFixed(1)}-${end.toFixed(1)}`);
          await removeBuffer(sourceBuffer, start, end);
          return;
        }
      }
    }

    async function appendBufferWithQuotaRetry(sourceBuffer, bytes, label) {
      try {
        await appendBuffer(sourceBuffer, bytes);
      } catch (err) {
        if (!(err && err.name === 'QuotaExceededError') && !String(err).includes('QuotaExceededError')) throw err;
        log(`${label} quota reached; pruning and retrying`);
        await pruneBehind(sourceBuffer, label);
        await sleep(100);
        await appendBuffer(sourceBuffer, bytes);
      }
    }

    async function appendTrackRange(sourceBuffer, initUrl, segmentUrls, label, startIndex, endIndex, includeInit, generation = appendGeneration) {
      if (fatal || generation !== appendGeneration) return;

      if (includeInit) {
        log(`${label} init fetch`);
        const initBytes = await fetchBytes(initUrl);
        if (fatal || generation !== appendGeneration) return;
        await appendBufferWithQuotaRetry(sourceBuffer, initBytes, label);
      }

      for (let i = startIndex; i < endIndex; i++) {
        if (fatal || generation !== appendGeneration) return;
        const bytes = await fetchBytes(segmentUrls[i]);
        if (fatal || generation !== appendGeneration) return;
        await appendBufferWithQuotaRetry(sourceBuffer, bytes, label);
        if (i === startIndex || i % 8 === 0) log(`${label} appended ${i + 1}/${segmentUrls.length}`);
      }
    }

    async function appendTrackWindow(sourceBuffer, segmentUrls, label, startIndex, generation = appendGeneration) {
      const maxAheadSeconds = 35;
      let i = startIndex;
      while (!fatal && generation === appendGeneration && i < segmentUrls.length) {
        const ahead = bufferedEnd(sourceBuffer) - (video.currentTime || 0);
        if (ahead > maxAheadSeconds) {
          await pruneBehind(sourceBuffer, label);
          await sleep(350);
          continue;
        }

        await pruneBehind(sourceBuffer, label);
        const bytes = await fetchBytes(segmentUrls[i]);
        if (fatal || generation !== appendGeneration) return;
        await appendBufferWithQuotaRetry(sourceBuffer, bytes, label);
        if (i === startIndex || i % 8 === 0) log(`${label} appended ${i + 1}/${segmentUrls.length}`);
        i++;
      }
      if (generation === appendGeneration) log(`${label} append loop complete`);
    }

    function startBackgroundAppend(startIndex, generation) {
      Promise.all([
        appendTrackWindow(videoBufferRef, config.video.segmentUrls, 'video', startIndex, generation),
        appendTrackWindow(audioBufferRef, config.audio.segmentUrls, 'audio', startIndex, generation)
      ]).then(() => {
        if (fatal || generation !== appendGeneration) return;
        log('background append complete');
        if (mediaSource.readyState === 'open') mediaSource.endOfStream();
      }).catch(err => {
        if (generation === appendGeneration) fail(err);
        else log(`background append cancelled generation=${generation}`);
      });
    }

    let firstFrameSent = false;
    let lastPlaybackPosition = 0;
    let lastPlaybackProgressAt = performance.now();
    let lastPostedBuffering = false;

    function notePlaybackProgress() {
      const position = video.currentTime || 0;
      if (Math.abs(position - lastPlaybackPosition) <= 0.05) return false;
      lastPlaybackPosition = position;
      lastPlaybackProgressAt = performance.now();
      return true;
    }

    function postFirstFrame(reason) {
      if (firstFrameSent) return;
      firstFrameSent = true;
      log(`first frame ${reason}`);
      host('first-frame', { reason });
      postState(false);
    }

    function armFirstFrameSignal() {
      if ('requestVideoFrameCallback' in HTMLVideoElement.prototype) {
        video.requestVideoFrameCallback(() => postFirstFrame('requestVideoFrameCallback'));
      }
    }

    function postState(isBuffering = false) {
      notePlaybackProgress();
      const effectiveBuffering = !!isBuffering
        || (desiredPlaying && !video.ended && video.paused);
      const currentSeconds = Number.isFinite(video.currentTime) ? video.currentTime : 0;
      const positionSeconds = pendingSeekSeconds ?? currentSeconds;
      lastPostedBuffering = effectiveBuffering;
      host('state', {
        positionMs: Math.round(positionSeconds * 1000),
        durationMs: Number.isFinite(video.duration) ? Math.round(video.duration * 1000) : config.durationMs,
        isPlaying: !video.paused && !video.ended,
        isBuffering: effectiveBuffering
      });
    }

    function scheduleUnmute(reason) {
      if (unmuteScheduled || !video.muted) return;
      unmuteScheduled = true;
      setTimeout(() => {
        unmuteScheduled = false;
        if (!desiredPlaying || video.ended || !video.muted) return;
        forceAudible(`scheduled-${reason}`);
        if (video.paused) playVideo(`unmute-${reason}`).catch(fail);
        else postState(false);
      }, 250);
    }

    async function playVideo(source) {
      desiredPlaying = true;
      try {
        forceAudible(source);
        await video.play();
        reportAudioState(`play-${source}`);
        postState(false);
        return true;
      } catch (err) {
        if (err && err.name === 'NotAllowedError') {
          desiredPlaying = false;
          const message = err && err.message ? err.message : String(err);
          log(`audible play blocked on ${source}: ${message}`);
          host('autoplay-blocked', { message });
          postState(false);
          return false;
        }
        throw err;
      }
    }

    async function recoverPlayback(reason) {
      if (fatal || stallRecoveryInFlight || !desiredPlaying) return;

      const now = performance.now();
      if (now - lastSoftRecoveryAt < 1400) return;
      lastSoftRecoveryAt = now;
      stallRecoveryInFlight = true;

      try {
        const ahead = videoBufferedAhead();
        if (now - lastBufferedLogAt > 2000) {
          lastBufferedLogAt = now;
          log(`recover ${reason}: readyState=${video.readyState} paused=${video.paused} ahead=${ahead.toFixed(2)}s pos=${(video.currentTime || 0).toFixed(2)}s`);
          reportAudioState(`recover-${reason}`, true);
        }

        if (video.paused && !video.ended) {
          await playVideo(`recover-paused-${reason}`);
          if (!video.paused) {
            postState(video.readyState < 3);
            return;
          }
        }

        if (ahead > 0.25 && !video.ended) {
          if (video.paused) {
            await playVideo(`recover-${reason}`);
          } else {
            const duration = Number.isFinite(video.duration) ? video.duration : config.durationMs / 1000;
            const current = video.currentTime || 0;
            const target = Math.min(Math.max(0, duration - 0.25), current + 0.035);
            if (target > current && target < duration) {
              video.currentTime = target;
            }
            await playVideo(`recover-${reason}`);
          }

          postState(false);
          return;
        }

        if (now - lastHardRecoveryAt > 8000) {
          lastHardRecoveryAt = now;
          const recoverySeconds = pendingSeekSeconds
            ?? (Number.isFinite(video.currentTime) ? video.currentTime : startSeconds || 0);
          host('recover-restart', {
            reason,
            positionMs: Math.round(recoverySeconds * 1000)
          });
        }
      } finally {
        stallRecoveryInFlight = false;
      }
    }

    function scheduleStallRecovery(reason) {
      setTimeout(() => {
        if (fatal || video.ended) return;
        const madeProgress = notePlaybackProgress();
        const stillWaiting = !madeProgress
          && desiredPlaying
          && (video.paused || video.readyState < 3 || performance.now() - lastPlaybackProgressAt > 1600);
        if (stillWaiting) recoverPlayback(reason).catch(fail);
      }, 1200);
    }

    async function rebuildBufferWindow(seconds, shouldPlay) {
      if (!sourceOpen || mediaSource.readyState === 'closed' || !videoBufferRef || !audioBufferRef) {
        video.currentTime = seconds;
        pendingSeekSeconds = null;
        if (shouldPlay) await playVideo('seek-simple');
        else postState(false);
        return;
      }

      const generation = ++appendGeneration;
      const startIndex = segmentIndexForSeconds(seconds);
      const startupEnd = Math.min(config.segmentTimes.length, startIndex + 5);
      log(`seek rebuild range ${startIndex + 1}-${startupEnd}/${config.segmentTimes.length} at ${seconds.toFixed(2)}s`);

      try {
        if (!video.paused)
          video.pause();

        await Promise.all([
          clearBufferedRanges(videoBufferRef, 'video'),
          clearBufferedRanges(audioBufferRef, 'audio')
        ]);

        if (fatal || generation !== appendGeneration) return;

        await Promise.all([
          appendTrackRange(videoBufferRef, config.video.initUrl, config.video.segmentUrls, 'video', startIndex, startupEnd, true, generation),
          appendTrackRange(audioBufferRef, config.audio.initUrl, config.audio.segmentUrls, 'audio', startIndex, startupEnd, true, generation)
        ]);

        if (fatal || generation !== appendGeneration) return;

        video.currentTime = seconds;
        pendingSeekSeconds = null;
        lastPlaybackPosition = seconds;
        lastPlaybackProgressAt = performance.now();
        postState(shouldPlay);

        if (shouldPlay)
          await playVideo('seek-window');

        startBackgroundAppend(startupEnd, generation);
      } catch (err) {
        if (generation !== appendGeneration) return;
        pendingSeekSeconds = null;
        log(`seek rebuild failed: ${err && err.message ? err.message : String(err)}`);
        host('recover-restart', {
          reason: 'seek-window-failed',
          positionMs: Math.round(seconds * 1000)
        });
      }
    }

    async function seekTo(ms) {
      const seconds = clampPlaybackSeconds(Number(ms) / 1000);
      pendingSeekSeconds = seconds;
      postState(true);

      if (isTimeBuffered(seconds)) {
        video.currentTime = seconds;
        pendingSeekSeconds = null;
        lastPlaybackPosition = seconds;
        lastPlaybackProgressAt = performance.now();
        if (desiredPlaying) await playVideo('seek-buffered');
        else postState(false);
        return;
      }

      await rebuildBufferWindow(seconds, desiredPlaying);
    }

    async function startMse() {
      mediaSource = new MediaSource();
      video.src = URL.createObjectURL(mediaSource);
      await new Promise(resolve => mediaSource.addEventListener('sourceopen', resolve, { once: true }));
      sourceOpen = true;
      log(`MediaSource open video=${config.video.contentType} audio=${config.audio.contentType}`);
      mediaSource.duration = Math.max(1, config.durationMs / 1000);

      const videoBuffer = mediaSource.addSourceBuffer(config.video.contentType);
      const audioBuffer = mediaSource.addSourceBuffer(config.audio.contentType);
      videoBufferRef = videoBuffer;
      audioBufferRef = audioBuffer;
      videoBuffer.mode = 'segments';
      audioBuffer.mode = 'segments';

      const startIndex = Math.max(0, Math.min(config.segmentTimes.length - 1, Math.floor(startSeconds / config.segmentLength)));
      const startupEnd = Math.min(config.segmentTimes.length, startIndex + 4);
      log(`startup append range ${startIndex + 1}-${startupEnd}/${config.segmentTimes.length}`);
      await Promise.all([
        appendTrackRange(videoBuffer, config.video.initUrl, config.video.segmentUrls, 'video', startIndex, startupEnd, true),
        appendTrackRange(audioBuffer, config.audio.initUrl, config.audio.segmentUrls, 'audio', startIndex, startupEnd, true)
      ]);

      if (startSeconds > 0) video.currentTime = startSeconds;
      armFirstFrameSignal();
      if (autoPlay) {
        await playVideo('startup');
        recoverPlayback('startup').catch(fail);
      } else {
        postState(false);
      }

      startBackgroundAppend(startupEnd, appendGeneration);
    }

    video.addEventListener('timeupdate', () => postState(false));
    video.addEventListener('durationchange', () => postState(false));
    video.addEventListener('loadeddata', () => postFirstFrame('loadeddata'));
    video.addEventListener('canplay', () => postFirstFrame('canplay'));
    video.addEventListener('playing', () => { postFirstFrame('playing'); forceAudible('playing'); reportAudioState('playing'); postState(false); });
    video.addEventListener('volumechange', () => reportAudioState('volumechange', true));
    video.addEventListener('canplaythrough', () => postState(false));
    video.addEventListener('pause', () => {
      if (desiredPlaying && !video.ended) {
        postState(true);
        scheduleStallRecovery('unexpected-pause');
      } else {
        postState(false);
      }
    });
    video.addEventListener('waiting', () => { postState(true); scheduleStallRecovery('waiting'); });
    video.addEventListener('stalled', () => { postState(true); scheduleStallRecovery('stalled'); });
    video.addEventListener('seeking', () => postState(true));
    video.addEventListener('seeked', () => { pendingSeekSeconds = null; postState(false); });
    video.addEventListener('ended', () => { desiredPlaying = false; host('ended'); });
    video.addEventListener('error', () => fail(video.error ? `media error code=${video.error.code} message=${video.error.message}` : 'media error'));

    setInterval(() => {
      if (fatal) return;

      const madeProgress = notePlaybackProgress();
      const isPlaying = !video.paused && !video.ended;
      if (!isPlaying) {
        if (desiredPlaying && !video.ended) {
          postState(true);
          recoverPlayback('watchdog-paused').catch(fail);
        } else if (lastPostedBuffering) {
          postState(false);
        }
        return;
      }

      if (madeProgress) {
        if (lastPostedBuffering) postState(false);
        return;
      }

      const duration = Number.isFinite(video.duration) ? video.duration : config.durationMs / 1000;
      const nearEnd = Number.isFinite(duration) && duration - (video.currentTime || 0) < 0.5;
      const buffering = !video.seeking
        && !nearEnd
        && (video.readyState < 3 || performance.now() - lastPlaybackProgressAt > 1800);

      reportAudioState('watchdog');
      if (buffering) recoverPlayback('watchdog').catch(fail);

      if (buffering !== lastPostedBuffering)
        postState(buffering);
    }, 500);

    window.__waveePlayer = {
      play: () => playVideo('host-play').catch(fail),
      pause: () => {
        desiredPlaying = false;
        video.pause();
        postState(false);
      },
      seek: ms => seekTo(ms).catch(fail),
      setVolume: value => {
        const clamped = Math.max(0, Math.min(1, Number(value)));
        hostVolumeSet = true;
        video.volume = Number.isFinite(clamped) ? clamped : 1;
        if (video.volume > 0 && video.muted) {
          video.muted = false;
          video.defaultMuted = false;
        }
        reportAudioState('host-volume', true);
        postState(false);
      }
    };

    (async () => {
      try {
        await configureEme();
        await startMse();
      } catch (err) {
        fail(err);
      }
    })();
  </script>
</body>
</html>
